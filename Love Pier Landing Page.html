<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Pier Beach Cafe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&family=Sarabun:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: #060d12; font-family: 'Jost', sans-serif; color: #e8dcc8; overflow-x: hidden; }
:root {
  --ocean-deep: #060d12; --ocean-mid: #0d1e2a; --ocean-surface: #112233;
  --teal: #4ecdc4; --teal-dim: #2a8a85;
  --gold: #c9a96e; --gold-light: #e5c97e;
  --cream: #f0e6d3; --sand: #c4a97d;
  --text-primary: #e8dcc8; --text-muted: #8a9ba8;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'Jost', sans-serif;
  --font-thai: 'Sarabun', sans-serif;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--ocean-deep); }
::-webkit-scrollbar-thumb { background: var(--teal-dim); border-radius: 2px; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.35;
}
.section-label {
  font-family: var(--font-body); font-size: 11px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--teal-dim);
  margin-bottom: 20px; padding-bottom: 10px;
  border-bottom: 1px solid rgba(78,205,196,0.2);
}
.lp-root { width: 100%; position: relative; overflow: hidden; }
/* DRAWER */
.drawer {
  position: fixed; top: 0; right: 0; width: 280px; height: 100vh;
  background: #070f16; border-left: 1px solid rgba(78,205,196,0.15);
  z-index: 1000; transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  display: flex; flex-direction: column; padding: 60px 40px 40px; gap: 0;
}
.drawer.open { transform: translateX(0); }
.drawer-close {
  position: absolute; top: 20px; right: 20px;
  background: none; border: none; color: var(--cream); font-size: 20px;
  cursor: pointer; opacity: 0.6; transition: opacity 0.2s;
}
.drawer-close:hover { opacity: 1; }
.drawer-nav-item {
  font-family: var(--font-display); font-size: 22px; font-weight: 300;
  color: var(--cream); text-decoration: none; padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: color 0.2s, padding-left 0.2s; letter-spacing: 0.04em;
}
.drawer-nav-item:hover { color: var(--teal); padding-left: 8px; }
.drawer-nav-thai { font-family: var(--font-thai); font-size: 13px; color: var(--teal-dim); display: block; font-weight: 300; margin-top: 2px; }
.ham-btn {
  position: absolute; top: 24px; right: 24px; z-index: 100;
  background: none; border: 1px solid rgba(255,255,255,0.2);
  width: 44px; height: 44px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px; cursor: pointer;
  transition: border-color 0.3s;
}
.ham-btn:hover { border-color: var(--teal); }
.ham-btn span { display: block; width: 18px; height: 1px; background: var(--cream); }
/* ANIMATIONS */
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.anim-fade-up { animation: fadeUp 0.8s ease forwards; }
.anim-delay-1 { animation-delay: 0.1s; opacity: 0; }
.anim-delay-2 { animation-delay: 0.25s; opacity: 0; }
.anim-delay-3 { animation-delay: 0.4s; opacity: 0; }
.anim-delay-4 { animation-delay: 0.55s; opacity: 0; }
/* PAGE HEADER */
.page-header { text-align: center; padding: 80px 40px 40px; }
.page-header-eyebrow { font-size: 10px; letter-spacing: 0.5em; color: var(--teal-dim); text-transform: uppercase; margin-bottom: 16px; }
.page-header-title { font-family: var(--font-display); font-size: clamp(40px,5vw,72px); font-weight: 300; color: var(--cream); letter-spacing: -0.01em; }
.page-header-title em { font-style: italic; color: var(--gold); }
.page-header-sub { font-family: var(--font-thai); font-size: 14px; color: var(--text-muted); margin-top: 12px; font-weight: 300; }
.variation-badges { display: flex; justify-content: center; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
.v-badge { font-size: 11px; letter-spacing: 0.15em; padding: 6px 16px; border: 1px solid rgba(78,205,196,0.3); color: var(--teal-dim); text-transform: uppercase; cursor: pointer; background: transparent; transition: all 0.2s; }

/* ===== V1: DARK OCEAN ===== */
.v1 { background: var(--ocean-deep); color: var(--text-primary); }
.v1-hero { position: relative; height: 100vh; min-height: 600px; display: flex; align-items: flex-end; overflow: hidden; }
.v1-hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.45) saturate(0.7); }
.v1-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #060d12 0%, transparent 50%, rgba(6,13,18,0.3) 100%); }
.v1-hero-content { position: relative; z-index: 2; padding: 60px; width: 100%; }
.v1-hero-eyebrow { font-size: 11px; letter-spacing: 0.4em; color: var(--teal); text-transform: uppercase; margin-bottom: 20px; font-weight: 300; }
.v1-hero-title { font-family: var(--font-display); font-size: clamp(52px,8vw,96px); font-weight: 300; line-height: 0.95; color: var(--cream); letter-spacing: -0.02em; }
.v1-hero-title em { font-style: italic; color: var(--gold-light); }
.v1-hero-tagline { font-family: var(--font-thai); font-size: 14px; color: var(--text-muted); margin-top: 16px; letter-spacing: 0.05em; font-weight: 300; }
.v1-hero-cta { margin-top: 32px; display: flex; gap: 16px; align-items: center; }
.btn-primary { background: var(--teal); color: var(--ocean-deep); border: none; padding: 12px 32px; font-family: var(--font-body); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.3s, transform 0.2s; font-weight: 500; }
.btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-ghost { background: none; color: var(--cream); border: 1px solid rgba(255,255,255,0.25); padding: 12px 32px; font-family: var(--font-body); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: border-color 0.3s, color 0.3s; }
.btn-ghost:hover { border-color: var(--teal); color: var(--teal); }
.v1-about { padding: 100px 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.v1-about-label { font-size: 10px; letter-spacing: 0.4em; color: var(--teal); text-transform: uppercase; margin-bottom: 24px; }
.v1-about-title { font-family: var(--font-display); font-size: clamp(36px,4vw,52px); font-weight: 300; line-height: 1.1; color: var(--cream); margin-bottom: 24px; }
.v1-about-title em { font-style: italic; color: var(--gold); }
.v1-about-body { font-family: var(--font-thai); font-size: 15px; line-height: 1.9; color: var(--text-muted); font-weight: 300; }
.v1-about-body p { margin-bottom: 12px; }
.v1-about-stats { display: flex; gap: 40px; margin-top: 40px; }
.stat-num { font-family: var(--font-display); font-size: 40px; font-weight: 300; color: var(--gold); display: block; line-height: 1; }
.stat-label { font-size: 11px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-top: 6px; font-family: var(--font-thai); }
.v1-about-img-wrap { position: relative; }
.v1-about-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; filter: saturate(0.7) brightness(0.85); }
.v1-about-img-deco { position: absolute; top: -20px; left: -20px; width: 60%; height: 60%; border: 1px solid rgba(78,205,196,0.2); pointer-events: none; }
.v1-menu { padding: 80px 60px; background: var(--ocean-mid); }
.section-header { text-align: center; margin-bottom: 60px; }
.section-header .eyebrow { font-size: 10px; letter-spacing: 0.4em; color: var(--teal); text-transform: uppercase; margin-bottom: 16px; display: block; }
.section-header h2 { font-family: var(--font-display); font-size: clamp(32px,4vw,52px); font-weight: 300; color: var(--cream); line-height: 1.1; }
.section-header h2 em { font-style: italic; color: var(--gold); }
.section-header .sub { font-family: var(--font-thai); font-size: 14px; color: var(--text-muted); margin-top: 10px; }
.menu-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; }
.menu-card { position: relative; overflow: hidden; aspect-ratio: 4/5; cursor: pointer; }
.menu-card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; filter: saturate(0.6) brightness(0.7); }
.menu-card:hover .menu-card-img { transform: scale(1.05); filter: saturate(0.8) brightness(0.85); }
.menu-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; background: linear-gradient(to top,rgba(6,13,18,0.95) 0%,transparent 100%); }
.menu-card-name { font-family: var(--font-display); font-size: 22px; font-weight: 300; color: var(--cream); }
.menu-card-name-thai { font-family: var(--font-thai); font-size: 12px; color: var(--teal); margin-top: 4px; font-weight: 300; }
.menu-card-price { font-size: 13px; color: var(--gold); margin-top: 6px; }
.v1-gallery { padding: 80px 60px; }
.gallery-mosaic { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
.gallery-mosaic .g0 { grid-column: span 2; grid-row: span 2; }
.gallery-mosaic .g3 { grid-column: span 2; }
.gallery-item { position: relative; overflow: hidden; background: var(--ocean-mid); }
.gallery-item img { width: 100%; height: 100%; min-height: 160px; object-fit: cover; transition: transform 0.6s, filter 0.6s; filter: saturate(0.5) brightness(0.7); }
.gallery-item:hover img { transform: scale(1.04); filter: saturate(0.9) brightness(1); }
.v1-events { padding: 80px 60px; background: var(--ocean-mid); }
.events-list { display: flex; flex-direction: column; margin-top: 40px; }
.event-row { display: grid; grid-template-columns: 80px 1fr auto; gap: 32px; align-items: center; padding: 28px 0; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: background 0.2s; }
.event-row:hover { background: rgba(78,205,196,0.03); }
.event-date { text-align: center; }
.event-day { font-family: var(--font-display); font-size: 36px; font-weight: 300; color: var(--gold); line-height: 1; }
.event-month { font-size: 10px; letter-spacing: 0.3em; color: var(--text-muted); text-transform: uppercase; }
.event-title { font-family: var(--font-display); font-size: 20px; font-weight: 300; color: var(--cream); }
.event-title-thai { font-family: var(--font-thai); font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.event-tag { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 12px; border: 1px solid rgba(78,205,196,0.3); color: var(--teal); }
.v1-contact { padding: 80px 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
.contact-block h3 { font-family: var(--font-display); font-size: 32px; font-weight: 300; color: var(--cream); margin-bottom: 24px; }
.contact-item { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 20px; }
.contact-icon { width: 32px; height: 32px; border: 1px solid rgba(78,205,196,0.3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--teal); font-size: 14px; }
.contact-text { font-family: var(--font-thai); font-size: 14px; color: var(--text-muted); line-height: 1.7; font-weight: 300; }
.contact-text strong { color: var(--cream); display: block; margin-bottom: 2px; font-weight: 400; }
.map-placeholder { background: var(--ocean-mid); border: 1px solid rgba(78,205,196,0.1); aspect-ratio: 16/10; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(78,205,196,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(78,205,196,0.05) 1px,transparent 1px); background-size: 30px 30px; }
.map-pin { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.map-pin-dot { width: 12px; height: 12px; background: var(--teal); border-radius: 50%; box-shadow: 0 0 0 4px rgba(78,205,196,0.2), 0 0 20px rgba(78,205,196,0.4); }
.map-pin-label { font-size: 11px; letter-spacing: 0.2em; color: var(--teal); text-transform: uppercase; }
.v1-footer { padding: 48px 60px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
.footer-logo { font-family: var(--font-display); font-size: 22px; font-weight: 300; color: var(--cream); letter-spacing: 0.08em; }
.footer-logo span { color: var(--teal); }
.social-links { display: flex; gap: 20px; }
.social-link { width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 11px; text-decoration: none; transition: border-color 0.3s, color 0.3s; letter-spacing: 0.05em; }
.social-link:hover { border-color: var(--teal); color: var(--teal); }
.footer-copy { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; }

/* ===== V2: WARM SAND & INK ===== */
.v2 { background: #f9f4ec; color: #1a1410; }
.v2-hero { position: relative; height: 100vh; min-height: 600px; display: grid; grid-template-columns: 1fr 1fr; }
.v2-hero-left { background: #1a1410; display: flex; flex-direction: column; justify-content: flex-end; padding: 60px; position: relative; overflow: hidden; }
.v2-hero-bg-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: var(--font-display); font-size: 180px; font-weight: 600; color: rgba(255,255,255,0.03); white-space: nowrap; pointer-events: none; letter-spacing: -0.05em; }
.v2-hero-eyebrow { font-size: 10px; letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
.v2-hero-title { font-family: var(--font-display); font-size: clamp(44px,5.5vw,72px); font-weight: 300; color: #f9f4ec; line-height: 0.95; }
.v2-hero-title em { font-style: italic; color: var(--gold); }
.v2-hero-tagline { font-family: var(--font-thai); font-size: 13px; color: rgba(249,244,236,0.5); margin-top: 20px; font-weight: 300; line-height: 1.6; }
.v2-hero-cta { margin-top: 36px; display: flex; gap: 12px; }
.v2-btn-primary { background: var(--gold); color: #1a1410; border: none; padding: 13px 32px; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: background 0.3s; }
.v2-btn-primary:hover { background: var(--gold-light); }
.v2-btn-ghost { background: none; color: #f9f4ec; border: 1px solid rgba(249,244,236,0.2); padding: 13px 32px; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: border-color 0.3s; }
.v2-btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.v2-hero-right { position: relative; overflow: hidden; }
.v2-hero-right img { width: 100%; height: 100%; object-fit: cover; filter: saturate(0.75); }
.v2-hero-right-deco { position: absolute; bottom: 40px; left: -20px; background: #f9f4ec; padding: 16px 24px; font-family: var(--font-display); font-size: 13px; color: #1a1410; letter-spacing: 0.1em; }
.v2-ham-btn { position: absolute; top: 24px; right: 24px; z-index: 100; background: rgba(249,244,236,0.9); border: none; width: 44px; height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; }
.v2-ham-btn span { display: block; width: 18px; height: 1px; background: #1a1410; }
.v2-about { padding: 100px 60px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px; align-items: center; background: #f9f4ec; }
.v2-about-label { font-size: 10px; letter-spacing: 0.4em; color: var(--sand); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
.v2-about-label::before { content: ''; display: block; width: 40px; height: 1px; background: var(--sand); }
.v2-about-title { font-family: var(--font-display); font-size: clamp(36px,4vw,52px); font-weight: 300; line-height: 1.1; color: #1a1410; margin-bottom: 24px; }
.v2-about-title em { font-style: italic; color: var(--gold); }
.v2-about-body { font-family: var(--font-thai); font-size: 15px; line-height: 1.9; color: #5a4a3a; font-weight: 300; }
.v2-about-body p { margin-bottom: 14px; }
.v2-about-img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.v2-about-img-grid img:first-child { grid-column: span 2; width: 100%; aspect-ratio: 16/9; object-fit: cover; filter: saturate(0.75); }
.v2-about-img-grid img { width: 100%; aspect-ratio: 4/3; object-fit: cover; filter: saturate(0.75); }
.v2-atmosphere { background: #1a1410; padding: 80px 0; overflow: hidden; }
.v2-atm-header { padding: 0 60px 48px; }
.v2-atm-header .eyebrow { font-size: 10px; letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; display: block; }
.v2-atm-header h2 { font-family: var(--font-display); font-size: clamp(32px,4vw,48px); font-weight: 300; color: #f9f4ec; }
.v2-atm-header h2 em { font-style: italic; color: var(--gold); }
.v2-strip { display: flex; gap: 4px; overflow-x: auto; padding: 0 60px; scrollbar-width: none; }
.v2-strip::-webkit-scrollbar { display: none; }
.v2-strip-item { flex: 0 0 280px; aspect-ratio: 3/4; overflow: hidden; }
.v2-strip-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; filter: saturate(0.6) brightness(0.8); }
.v2-strip-item:hover img { transform: scale(1.05); filter: saturate(0.9) brightness(1); }
.v2-menu { padding: 80px 60px; background: #f9f4ec; }
.v2-menu-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-top: 48px; }
.v2-menu-item img { width: 100%; aspect-ratio: 1; object-fit: cover; filter: saturate(0.75); margin-bottom: 16px; }
.v2-menu-name { font-family: var(--font-display); font-size: 18px; font-weight: 300; color: #1a1410; }
.v2-menu-thai { font-family: var(--font-thai); font-size: 12px; color: var(--sand); margin-top: 3px; }
.v2-menu-price { font-size: 13px; color: var(--gold); margin-top: 6px; }
.v2-menu-desc { font-family: var(--font-thai); font-size: 12px; color: #7a6a5a; margin-top: 6px; line-height: 1.6; }
.v2-footer { background: #1a1410; padding: 60px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 40px; }
.v2-footer-logo { font-family: var(--font-display); font-size: 28px; font-weight: 300; color: #f9f4ec; margin-bottom: 16px; }
.v2-footer-logo em { font-style: italic; color: var(--gold); }
.v2-footer-sub { font-family: var(--font-thai); font-size: 13px; color: rgba(249,244,236,0.4); line-height: 1.7; }
.v2-footer-col h4 { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
.v2-footer-col p, .v2-footer-col a { font-family: var(--font-thai); font-size: 13px; color: rgba(249,244,236,0.5); line-height: 1.8; text-decoration: none; display: block; transition: color 0.2s; }
.v2-footer-col a:hover { color: var(--gold); }

/* ===== V3: EDITORIAL MINIMAL ===== */
.v3 { background: #fafaf7; color: #111; }
.v3-hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; overflow: hidden; padding: 100px 60px; }
.v3-hero-bg { position: absolute; inset: 0; display: grid; grid-template-columns: 1fr 1fr 1fr; }
.v3-hero-bg-col { border-right: 1px solid rgba(0,0,0,0.06); }
.v3-hero-bg-col:last-child { border: none; }
.v3-hero-img { position: absolute; right: 0; top: 0; width: 48%; height: 100%; object-fit: cover; filter: saturate(0.5) brightness(0.9); }
